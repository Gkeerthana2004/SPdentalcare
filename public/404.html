<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | SP Dental Care</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦷</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ivory: #F9F6F0;
  --cream: #EDE8DE;
  --gold: #C9A84C;
  --deep: #1A1612;
  --teal: #2D6E6E;
  --teal-light: #3D8E8E;
  --white: #FFFFFF;
  --muted: #7A7267;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'DM Sans', sans-serif;
  background: linear-gradient(135deg, var(--ivory) 0%, var(--cream) 100%);
  color: var(--deep);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}
.container {
  max-width: 480px;
}
.tooth {
  font-size: 80px;
  margin-bottom: 16px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.error-code {
  font-family:'Cormorant Garamond', serif;
  font-size: 96px;
  font-weight: 600;
  color: var(--teal);
  line-height: 1;
  margin-bottom: 8px;
}
h1 {
  font-family:'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--deep);
  margin-bottom: 12px;
}
p {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 32px;
  line-height: 1.6;
}
.btn {
  display: inline-block;
  padding: 14px 32px;
  border-radius: 14px;
  font-family:'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s ease;
  margin: 6px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--teal), var(--teal-light));
  color: white;
  box-shadow: 0 8px 32px rgba(45,110,110,0.3);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(45,110,110,0.4);
}
.btn-outline {
  background: transparent;
  color: var(--teal);
  border: 1.5px solid var(--teal);
}
.btn-outline:hover {
  background: var(--teal);
  color: white;
}
.contact {
  margin-top: 40px;
  font-size: 13px;
  color: var(--muted);
}
.contact a {
  color: var(--teal);
  text-decoration: none;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="container">
  <div class="tooth">🦷</div>
  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>Looks like this page took a break. Don't worry — your smile is still in good hands!</p>
  <a href="/" class="btn btn-primary">← Back to Home</a>
  <a href="/#booking" class="btn btn-outline">Book Appointment</a>
  <div class="contact">
    <p>Need help? Call us at <a href="tel:+919176640037">+91 91766 40037</a></p>
  </div>
</div>
</body>
</html>
